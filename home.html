<!DOCTYPE html>
<html>
<head>
    <title>Online Voting System - Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #4CAF50;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        .box {
            width: 400px;
            margin: 150px auto;
            background: #008CBA;
            padding: 30px;
            box-shadow: 0 0 10px #9c27b0;
            border-radius: 8px;
        }
        h1 {
            color: #ffeb3b;
        }
        button {
            width: 80%;
            padding: 12px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
            border: 2px solid #222;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Online Voting System</h1>
    <p>Select your role</p>

    <button onclick="goVote()">Voter Page</button>
    <button onclick="goAdmin()">Admin Login</button>
</div>

<script>
    function goVote() {
        window.location.href = "voter registration.html";
    }

    function goAdmin() {
        window.location.href = "admin.html";
    }
</script>

</body>
</html>
